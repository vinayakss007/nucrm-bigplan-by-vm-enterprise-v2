---
route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - receiver: critical
      match:
        severity: critical
      repeat_interval: 30m
    - receiver: warning
      match:
        severity: warning
      repeat_interval: 4h

receivers:
  - name: default

  - name: critical
    email_configs:
      - to: '{{ .ExternalURL }}'
        send_resolved: true
        headers:
          subject: '[NuCRM CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: '{{ template "slack.nucrm.url" . }}'
        channel: '#alerts-critical'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    webhook_configs:
      - url: '{{ template "webhook.nucrm.url" . }}'
        send_resolved: true

  - name: warning
    slack_configs:
      - api_url: '{{ template "slack.nucrm.url" . }}'
        channel: '#alerts-warnings'
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
