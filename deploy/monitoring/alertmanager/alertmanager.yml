---
route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - receiver: critical
      match:
        severity: critical
      repeat_interval: 30m
    - receiver: warning
      match:
        severity: warning
      repeat_interval: 4h

receivers:
  - name: default
    # No-op — logs to stdout by default
  - name: critical
    # Configure email, Slack, PagerDuty, etc. here
  - name: warning

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
