###############################################################################
#  NuCRM — Production Docker Compose (8GB VM Single-Machine)
#
#  Services:
#    - nginx        (reverse proxy + SSL + rate limiting)
#    - app x2       (Next.js 16 frontend)
#    - worker x1    (BullMQ background jobs)
#    - cron         (scheduled job trigger)
#    - redis        (Redis 7 — cache + queues)
#    - minio        (S3-compatible object storage)
#    - prometheus   (metrics collection)
#    - grafana      (dashboards + alerting)
#    - node-exporter       (host system metrics)
#    - redis-exporter      (cache metrics)
#
#  PostgreSQL runs directly on the host (not in Docker).
#  Set DATABASE_URL in .env to point to the host Postgres instance.
#
#  Memory budget (8GB total, ~7.5GB usable):
#    nginx:             64MB
#    app x2:           1.5GB (768MB each)
#    worker:            512MB
#    cron:              128MB
#    redis:             512MB
#    minio:             512MB
#    prometheus:        256MB
#    grafana:           256MB
#    exporters:          80MB (combined)
#    OS + Postgres:    ~3.2GB
#                     ──────
#    Total:           ~7.3GB
#
#  Usage:
#    docker compose -f deploy/docker-compose.production.yml up -d
#    docker compose -f deploy/docker-compose.production.yml logs -f
#    docker compose -f deploy/docker-compose.production.yml down
###############################################################################

services:
  # ═══════════════════════════════════════════════════════════════════════════
  #  NGINX — Reverse Proxy + SSL Termination
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.27-alpine
    container_name: nucrm-nginx
    ports:
      - "${NUCRM_PUBLIC_PORT:-80}:80"
      - "${NUCRM_PUBLIC_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx-production.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - nucrm-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  #  APP — Next.js 16 (scalable replicas)
  # ═══════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        JWT_SECRET: "build-only-not-runtime"
        SENTRY_DSN: "${SENTRY_DSN:-}"
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
        SENTRY_ORG: "${SENTRY_ORG:-}"
        SENTRY_PROJECT: "${SENTRY_PROJECT:-}"
        SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SETUP_KEY=${SETUP_KEY}
      - CRON_SECRET=${CRON_SECRET}
      - EMERGENCY_RECOVERY_KEY=${EMERGENCY_RECOVERY_KEY:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_ENABLE=${SENTRY_ENABLE:-true}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BACKUP_BUCKET=${BACKUP_BUCKET:-nucrm-backups}
      - DOCUMENT_BUCKET=${DOCUMENT_BUCKET:-nucrm-documents}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - USAGE_LIMITS=${USAGE_LIMITS:-on}
      - MODULE_AUTO_INSTALL=${MODULE_AUTO_INSTALL:-on}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-20}
      - DATABASE_SSL=${DATABASE_SSL:-false}
    expose:
      - "3000"
    deploy:
      replicas: ${NUCRM_WEB_REPLICAS:-2}
      resources:
        limits:
          memory: ${NUCRM_WEB_MEMORY_LIMIT:-768M}
          cpus: '${NUCRM_WEB_CPU_LIMIT:-1.5}'
        reservations:
          memory: 384M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  WORKER — BullMQ Background Jobs
  # ═══════════════════════════════════════════════════════════════════════════
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    container_name: nucrm-worker
    command: ["node", "--import", "tsx", "worker.ts"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    deploy:
      replicas: ${NUCRM_WORKER_REPLICAS:-1}
      resources:
        limits:
          memory: ${NUCRM_WORKER_MEMORY_LIMIT:-512M}
          cpus: '${NUCRM_WORKER_CPU_LIMIT:-0.5}'
        reservations:
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  CRON — Scheduled Job Trigger (internal HTTP calls)
  # ═══════════════════════════════════════════════════════════════════════════
  cron:
    image: alpine:3.20
    container_name: nucrm-cron
    volumes:
      - ./cron/crontab:/etc/crontabs/root:ro
      - ./cron/run-cron.sh:/usr/local/bin/run-cron.sh:ro
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - APP_URL=http://app:3000
    command: ["crond", "-f", "-l", "2"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  REDIS 7
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: nucrm-redis
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  MINIO — S3-Compatible Object Storage
  # ═══════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: nucrm-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-512M}
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nucrm-net

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: nucrm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY};
        mc mb --ignore-existing local/${BACKUP_BUCKET:-nucrm-backups};
        mc mb --ignore-existing local/${DOCUMENT_BUCKET:-nucrm-documents};
        mc anonymous set download local/${DOCUMENT_BUCKET:-nucrm-documents}/public;
        echo 'Buckets initialized';
      "
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  MONITORING — Prometheus + Grafana
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nucrm-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - nucrm-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nucrm-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GRAFANA_SERVER_ROOT_URL:-http://localhost:3001}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  LOGGING — Loki + Promtail
  # ═══════════════════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.0.0
    container_name: nucrm-loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    command:
      - '--config.file=/etc/loki/loki-config.yml'
    ports:
      - "127.0.0.1:3100:3100"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - nucrm-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: nucrm-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - nginx-logs:/var/log/nginx:ro
    command:
      - '--config.file=/etc/promtail/promtail-config.yml'
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - nucrm-net

  # ═══════════════════════════════════════════════════════════════════════════
  #  EXPORTERS — System & Service Metrics
  # ═══════════════════════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: nucrm-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - nucrm-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: nucrm-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

# ═══════════════════════════════════════════════════════════════════════════
#  VOLUMES
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  redisdata:
    driver: local
  miniodata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local
  nginx-logs:
    driver: local
  lokidata:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════
#  NETWORK
# ═══════════════════════════════════════════════════════════════════════════
networks:
  nucrm-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
