# =============================================================================
# Local Development Only
#
# During development, the app and worker run directly on the host via:
#   npm run dev
#
# This compose file only provides supporting services needed locally.
# Postgres also runs on the host (not in Docker).
#
# For production, use: deploy/docker-compose.production.yml
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: nucrm-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
