##############################################################################
# NuCRM — Docker Compose (Full Stack)
##############################################################################

services:
  # ── Nginx Load Balancer ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nucrm-lb
    ports:
      - "${NUCRM_PUBLIC_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Web Frontend (Next.js) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nucrm-app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nucrm_redis_password_change_me}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SETUP_KEY=${SETUP_KEY}
      - CRON_SECRET=${CRON_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - NODE_OPTIONS=--max-old-space-size=2048
    expose:
      - "3000"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── Background Worker (BullMQ) ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "--import", "tsx", "worker.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nucrm_redis_password_change_me}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SETUP_KEY=${SETUP_KEY}
      - CRON_SECRET=${CRON_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_SSL=${DATABASE_SSL:-true}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nucrm-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nucrm}
      - POSTGRES_USER=${POSTGRES_USER:-nucrm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Restrict to localhost only for security
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nucrm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── Loki (Log Aggregation) ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: nucrm-loki
    volumes:
      - ./deploy/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    command:
      - '--config.file=/etc/loki/loki-config.yml'
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nucrm-alertmanager
    volumes:
      - ./deploy/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./deploy/monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanagerdata:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - CRITICAL_ERROR_WEBHOOK_URL=${CRITICAL_ERROR_WEBHOOK_URL:-}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── Promtail (Log Shipper) ───────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: nucrm-promtail
    volumes:
      - ./deploy/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
    command:
      - '--config.file=/etc/promtail/promtail-config.yml'
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - nucrm-net

  # ── PgBouncer (Connection Pooling) ──────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23
    container_name: nucrm-pgbouncer
    environment:
      - DB_USER=${POSTGRES_USER:-nucrm}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-nucrm}
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=50
      - MAX_CLIENT_CONN=200
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nucrm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-nucrm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nucrm-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-nucrm_redis_password_change_me}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      # Restrict to localhost only for security
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nucrm_redis_password_change_me}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nucrm-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  lokidata:
    driver: local
  alertmanagerdata:
    driver: local

networks:
  nucrm-net:
    driver: bridge
