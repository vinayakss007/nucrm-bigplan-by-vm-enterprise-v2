name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_ENV: production
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}
  HEALTH_CHECK_RETRIES: 12
  HEALTH_CHECK_INTERVAL: 10

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/nucrm

            echo "Pulling new image..."
            docker compose pull app

            echo "Starting rolling update..."
            docker compose up -d --no-deps --scale app=2 --no-recreate app

            echo "Waiting for new container health check..."
            NEW_CONTAINER=""
            for i in $(seq 1 ${{ env.HEALTH_CHECK_RETRIES }}); do
              NEW_CONTAINER=$(docker compose ps -q app | tail -1)
              if [ -n "$NEW_CONTAINER" ]; then
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_CONTAINER" 2>/dev/null || echo "starting")
                if [ "$STATUS" = "healthy" ]; then
                  echo "New container healthy after ${i}x${{ env.HEALTH_CHECK_INTERVAL }}s"
                  break
                fi
              fi
              sleep ${{ env.HEALTH_CHECK_INTERVAL }}
            done

            if [ -z "$NEW_CONTAINER" ]; then
              echo "ERROR: Health check failed. Rolling back."
              docker compose up -d --no-deps --scale app=1 app
              exit 1
            fi

            echo "Stopping old container..."
            OLD_CONTAINER=$(docker compose ps -q app | head -1)
            docker stop "$OLD_CONTAINER" 2>/dev/null || true
            docker compose up -d --no-deps --scale app=1 app

            echo "Cleaning up..."
            docker container prune -f
            docker image prune -f

            echo "Deploy complete: ${{ github.sha }}"
