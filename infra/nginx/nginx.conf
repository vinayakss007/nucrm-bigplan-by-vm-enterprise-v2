# NuCRM — Nginx Load Balancer Configuration
#
# Distributes traffic across multiple Next.js instances.
# Handles: TLS termination, connection pooling, health checks,
# static asset caching, request buffering, rate limiting.
#
# Scale instances: docker compose -f docker-compose.scale.yml up --scale web=4
# Nginx auto-discovers new instances via Docker DNS.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ─────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── MIME Types ─────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting (defense in depth — app also has its own) ───────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Upstream — Next.js Instances ──────────────────────────────────────
    # Docker Compose service discovery: "web" resolves to all replicas
    upstream nucrm_web {
        least_conn;  # Route to instance with fewest active connections
        server web:3000 max_fails=3 fail_timeout=30s;

        # Connection pooling to upstream
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ── Server Block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check for the load balancer itself
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── Static Assets (Next.js _next/static) ─────────────────────────
        # Served directly with aggressive caching
        location /_next/static/ {
            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Immutable cache — 1 year
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status "STATIC";
        }

        # ── Public static files ──────────────────────────────────────────
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header Cache-Control "public, max-age=86400";
            expires 1d;
        }

        # ── API Routes ───────────────────────────────────────────────────
        location /api/ {
            # Rate limiting on API
            limit_req zone=api burst=30 nodelay;
            limit_conn perip 50;

            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings for API responses
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;

            # No caching for API
            add_header Cache-Control "no-store, no-cache, must-revalidate, private";
        }

        # ── Auth Routes (stricter rate limit) ────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn perip 10;

            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
        }

        # ── Cron Routes (internal only) ──────────────────────────────────
        location /api/cron/ {
            # Only allow internal network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 120s; # Cron jobs may take longer
        }

        # ── All Other Routes (pages) ─────────────────────────────────────
        location / {
            proxy_pass http://nucrm_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering for page responses
            proxy_buffer_size 32k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ── Security Headers ─────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Request Size Limits ──────────────────────────────────────────
        client_max_body_size 50M;  # For file uploads
        client_body_buffer_size 128k;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name your-domain.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}
